name: Build and Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build --no-daemon

      - name: Upload JAR as artifact
        uses: actions/upload-artifact@v4
        with:
          name: meteor-chunk-addon-jar
          path: build/libs/*.jar
          if-no-files-found: error

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: "Meteor Chunk Addon v1.0.0"
          body: |
            ## Meteor Chunk Addon v1.0.0

            ### Moduller
            - **Spawner Finder** — Chunk'larda spawner arar ve ESP ile gosterir
            - **Sus Chunk Finder** — Anormal sandik/spawner/cevher iceren chunk'lari tespit eder

            ### Kurulum
            1. `.jar` dosyasini `mods` klasorune koy (sources jar'i degil)
            2. Meteor Client 0.5.9 ile Minecraft 1.21.4 Fabric'i baslat
            3. Meteor menusu -> **Chunk Addon** kategorisini ac
          files: build/libs/meteor-chunk-addon-1.0.0.jar
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
