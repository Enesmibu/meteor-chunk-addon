name: Build and Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Get version
        id: get_version
        run: echo "VERSION=$(./gradlew properties -q | grep '^version:' | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: "Meteor Chunk Addon v${{ steps.get_version.outputs.VERSION }}"
          body: |
            ## Meteor Chunk Addon v${{ steps.get_version.outputs.VERSION }}

            ### Modüller
            - **Spawner Finder** — Chunk'larda spawner arar ve ESP ile gösterir
            - **Sus Chunk Finder** — Anormal sandık/spawner/cevher içeren chunk'ları tespit eder

            ### Kurulum
            1. `.jar` dosyasını `mods` klasörüne koy
            2. Meteor Client 0.5.9 ile Minecraft 1.21.4 Fabric'i başlat
            3. Meteor menüsünde **Chunk Addon** kategorisini aç
          files: build/libs/*-${{ steps.get_version.outputs.VERSION }}.jar
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
